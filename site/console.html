<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Chạy Console</title>
  <style>
    :root {
      --bg: #eef2f6;
      --surface: #ffffff;
      --surface-soft: #f8fafc;
      --ink: #172033;
      --muted: #64748b;
      --line: #d8e1ea;
      --primary: #102033;
      --accent: #0f766e;
      --accent-soft: #e6f4f1;
      --warn: #b45309;
      --danger: #b42318;
      --code-bg: #101828;
      --code-ink: #d8e7ff;
      --shadow: 0 10px 28px rgba(16, 32, 51, 0.08);
    }

    * { box-sizing: border-box; }
    html { color-scheme: light; }
    body {
      margin: 0;
      min-height: 100dvh;
      font: 14px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    button, textarea, input, select { font: inherit; }
    button {
      min-height: 44px;
      border: 0;
      border-radius: 8px;
      padding: 10px 14px;
      background: var(--primary);
      color: #fff;
      cursor: pointer;
      transition: background 180ms ease, box-shadow 180ms ease, transform 180ms ease;
    }
    button:hover { background: #1d3148; }
    button:active { transform: translateY(1px); }
    button:disabled {
      cursor: wait;
      opacity: 0.68;
      transform: none;
    }
    button:focus-visible, textarea:focus-visible, input:focus-visible, select:focus-visible {
      outline: 3px solid rgba(15, 118, 110, 0.26);
      outline-offset: 2px;
    }
    button.secondary {
      background: #e2e8f0;
      color: var(--ink);
    }
    button.secondary:hover { background: #d6dee9; }

    textarea, input, select {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--ink);
      background: #fff;
    }
    textarea {
      min-height: 92px;
      resize: vertical;
    }
    input[type="checkbox"] {
      width: 18px;
      min-height: 18px;
      accent-color: var(--accent);
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: var(--ink);
      font-weight: 650;
    }

    .app-header {
      min-height: 64px;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      background: var(--primary);
      color: #fff;
      box-shadow: var(--shadow);
    }
    .brand {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px 14px;
      min-width: 0;
    }
    .brand-mark {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #19c37d;
      box-shadow: 0 0 0 5px rgba(25, 195, 125, 0.14);
      flex: 0 0 auto;
    }
    .brand-title { font-size: 16px; font-weight: 750; }
    .header-meta {
      color: #c7d7ea;
      font-size: 12px;
      overflow-wrap: anywhere;
    }
    .live-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 28px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 999px;
      padding: 3px 10px;
      color: #dce8f6;
      font-size: 12px;
      white-space: nowrap;
    }
    .live-pill::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f59e0b;
    }
    .live-pill.connected::before { background: #19c37d; }
    .live-pill.disconnected::before { background: #ef4444; }

    .layout {
      display: grid;
      grid-template-columns: minmax(260px, 300px) minmax(0, 1fr) minmax(300px, 380px);
      min-height: calc(100dvh - 64px);
    }
    .sidebar, .inspector {
      background: var(--surface);
      overflow: auto;
    }
    .sidebar { border-right: 1px solid var(--line); }
    .inspector { border-left: 1px solid var(--line); }
    .workspace {
      min-width: 0;
      overflow: auto;
      padding: 18px;
    }
    .panel {
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }
    .panel h2, .section-title {
      margin: 0 0 12px;
      font-size: 14px;
      line-height: 1.2;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    .actions button { margin: 0; }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }
    .field-full { grid-column: 1 / -1; }
    .check-row {
      min-height: 44px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--ink);
      font-weight: 650;
    }
    .field-help {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
    }
    .muted { color: var(--muted); }

    .flow {
      display: grid;
      grid-template-columns: repeat(4, minmax(150px, 1fr));
      gap: 12px;
    }
    .lane {
      min-height: 210px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-soft);
      overflow: hidden;
    }
    .lane h3 {
      margin: 0;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }
    .lane h3 span { display: block; color: var(--ink); font-size: 13px; }
    .lane h3 code { color: var(--muted); font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 11px; }
    .agent-card {
      margin: 10px;
      padding: 10px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 4px 12px rgba(16, 32, 51, 0.06);
    }
    .agent-card b, .item b { display: block; }
    .agent-card .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 10px;
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
    }
    .agent-card p, .item p {
      margin: 7px 0 0;
      color: #334155;
      overflow-wrap: anywhere;
    }
    .section-block { margin-top: 18px; }
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
    }
    .section-head .section-title { margin: 0; }
    .section-head small { color: var(--muted); }
    .item {
      padding: 10px 0;
      border-top: 1px solid #edf2f7;
      overflow-wrap: anywhere;
    }
    .status {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 999px;
      padding: 2px 8px;
      color: var(--accent);
      background: var(--accent-soft);
      font-size: 12px;
      font-weight: 650;
    }
    .status.warn {
      color: var(--warn);
      background: #fff7ed;
    }
    .status.danger {
      color: var(--danger);
      background: #fff1f2;
    }
    .log {
      min-height: 96px;
      margin-top: 12px;
      white-space: pre-wrap;
      border-radius: 8px;
      padding: 12px;
      background: var(--code-bg);
      color: var(--code-ink);
      font: 12px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      overflow: auto;
    }
    .files { font-size: 12px; }

    @media (max-width: 1180px) {
      .layout { grid-template-columns: minmax(260px, 300px) minmax(0, 1fr); }
      .inspector {
        grid-column: 1 / -1;
        border-left: 0;
        border-top: 1px solid var(--line);
      }
      .flow { grid-template-columns: repeat(3, minmax(140px, 1fr)); }
    }

    @media (max-width: 760px) {
      .app-header { align-items: flex-start; flex-direction: column; }
      .layout { grid-template-columns: 1fr; }
      .sidebar, .inspector {
        border-right: 0;
        border-left: 0;
      }
      .workspace { padding: 14px; }
      .flow { grid-template-columns: 1fr; }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true"></span>
      <span class="brand-title">Chạy Console</span>
      <span id="stamp" class="header-meta"></span>
      <span id="runner" class="header-meta" aria-live="polite"></span>
    </div>
    <span id="streamStatus" class="live-pill disconnected" aria-live="polite">Connecting</span>
  </header>

  <div class="layout">
    <aside class="sidebar" aria-label="Task controls">
      <section class="panel">
        <h2>Worker run</h2>
        <label for="taskText">Task for worker</label>
        <textarea id="taskText" placeholder="Describe the task for the agent"></textarea>
        <div class="form-grid">
          <div>
            <label for="workerName">Worker</label>
            <input id="workerName" value="codex" autocomplete="off">
          </div>
          <div>
            <label for="agentName">Engine</label>
            <input id="agentName" value="codex" autocomplete="off">
          </div>
          <div>
            <label for="maxRetries">Retries</label>
            <input id="maxRetries" type="number" min="0" max="10" value="3">
          </div>
          <label class="check-row" for="isolate">
            <input id="isolate" type="checkbox">
            Isolate
          </label>
          <div class="field-full">
            <label for="testCommand">Test command</label>
            <input id="testCommand" placeholder="npm test">
            <span class="field-help">Optional. Dispatch emits testing only when this is set.</span>
          </div>
        </div>
        <div class="actions">
          <button type="button" class="secondary" data-action="create-note">Create note</button>
          <button type="button" data-action="create-task">Create + Run</button>
          <button type="button" class="secondary" data-action="run-worker">Run worker</button>
        </div>
      </section>

      <section class="panel">
        <h2>Manual progress</h2>
        <label for="progressStep">Step</label>
        <select id="progressStep"></select>
        <label for="progressMessage">Message</label>
        <input id="progressMessage" placeholder="Editing backend structure">
        <div class="actions">
          <button type="button" class="secondary" data-action="update-progress">Write progress</button>
        </div>
      </section>

      <section class="panel">
        <h2>Efficiency</h2>
        <div id="quality"></div>
        <div class="actions">
          <button type="button" class="secondary" data-action="eval-report">Refresh quality</button>
        </div>
      </section>

      <section class="panel">
        <h2>Token budget</h2>
        <div id="tokens"></div>
        <div class="actions">
          <button type="button" class="secondary" data-action="token-report">Refresh tokens</button>
        </div>
      </section>

      <section class="panel">
        <h2>Checks</h2>
        <div class="actions">
          <button type="button" data-action="validate-output">Validate result</button>
          <button type="button" class="secondary" data-action="patch-check">Patch check</button>
          <button type="button" class="secondary" data-action="experience-snapshot">Experience</button>
        </div>
        <div id="checks" class="log" aria-live="polite"></div>
        <div id="actionResult" class="log" aria-live="polite"></div>
      </section>
    </aside>

    <main class="workspace" aria-label="Realtime workflow">
      <div id="flow" class="flow"></div>

      <section class="section-block">
        <h2 class="section-title">Tasks</h2>
        <div id="tasks"></div>
      </section>

      <section class="section-block">
        <h2 class="section-title">Timeline</h2>
        <div id="timeline"></div>
      </section>

      <section class="section-block">
        <h2 class="section-title">Plan ledger</h2>
        <div id="ledger"></div>
      </section>
    </main>

    <aside class="inspector" aria-label="Project context">
      <section class="panel">
        <h2>Selected files</h2>
        <div id="files" class="files"></div>
      </section>

      <section class="panel">
        <h2>Experience</h2>
        <div id="experience"></div>
      </section>

      <section class="panel">
        <h2>Chat</h2>
        <div id="chat"></div>
        <label for="message">Message</label>
        <textarea id="message" placeholder="Send a note to main or codex"></textarea>
        <div class="actions">
          <button type="button" data-action="send-chat">Send</button>
        </div>
      </section>
    </aside>
  </div>

  <script>
    const agentAliases = { anti: "antigravity" };
    const steps = ["assigned", "reading", "planning", "editing", "validate_result", "testing", "patch_check", "done", "blocked"];
    const stepLabels = {
      assigned: "Assigned",
      reading: "Reading",
      planning: "Planning",
      editing: "Editing",
      validate_result: "Validate result",
      testing: "Testing",
      patch_check: "Patch check",
      done: "Done",
      blocked: "Blocked"
    };
    const $ = (id) => document.getElementById(id);
    const els = {
      stamp: $("stamp"),
      runner: $("runner"),
      streamStatus: $("streamStatus"),
      flow: $("flow"),
      taskText: $("taskText"),
      workerName: $("workerName"),
      agentName: $("agentName"),
      maxRetries: $("maxRetries"),
      isolate: $("isolate"),
      testCommand: $("testCommand"),
      progressStep: $("progressStep"),
      progressMessage: $("progressMessage"),
      quality: $("quality"),
      tokens: $("tokens"),
      checks: $("checks"),
      actionResult: $("actionResult"),
      tasks: $("tasks"),
      timeline: $("timeline"),
      ledger: $("ledger"),
      files: $("files"),
      experience: $("experience"),
      chat: $("chat"),
      message: $("message")
    };
    let currentState = null;
    let clockTimer = null;

    document.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-action]");
      if (!button) return;
      runButtonAction(button, actions[button.dataset.action]);
    });

    const actions = {
      "create-note": createNote,
      "create-task": createTask,
      "run-worker": runWorker,
      "update-progress": updateProgress,
      "validate-output": validateOutput,
      "patch-check": patchCheck,
      "token-report": tokenReport,
      "eval-report": evalReport,
      "experience-snapshot": experienceSnapshot,
      "send-chat": sendChat
    };

    async function runButtonAction(button, action) {
      if (!action) return;
      const old = button.textContent;
      button.disabled = true;
      button.textContent = "Working...";
      try {
        await action();
      } catch (error) {
        showResult({ ok: false, error: error.message || String(error) });
      } finally {
        button.disabled = false;
        button.textContent = old;
      }
    }

    async function api(path, body) {
      const response = await fetch(path, {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify(body)
      });
      const data = await response.json();
      if (!response.ok) data.http_status = response.status;
      return data;
    }

    function render(state) {
      currentState = state;
      els.stamp.textContent = new Date(state.generated_at).toLocaleTimeString();
      renderRunnerClock();
      syncControls(state);
      els.flow.innerHTML = steps.map((step) => `<div class="lane"><h3><span>${stepLabels[step] || step}</span><code>${step}</code></h3><div id="c-${step}"></div></div>`).join("");

      for (const agent of state.agents) {
        const step = steps.includes(agent.step) ? agent.step : "assigned";
        $(`c-${step}`).insertAdjacentHTML("beforeend", [
          "<div class=\"agent-card\">",
          `<b>${esc(agent.agent)}</b>`,
          `<small>${esc(agent.role)} / ${esc(agent.llm)}</small>`,
          `<p>${esc(agent.message || agent.step)}</p>`,
          `<div class="meta"><span>${esc(stepLabels[step] || step)}</span><span class="live-age" data-at="${esc(agent.updated_at || "")}">${esc(ageText(agent.updated_at))}</span></div>`,
          "</div>"
        ].join(""));
      }

      els.tasks.innerHTML = state.tasks.map((task) => [
        "<div class=\"item\">",
        `<b>${esc(task.agent || "")}</b> <span class="status">${esc(task.status || "")}</span>`,
        `<p>${esc(task.goal || "")}</p>`,
        `<small>${esc((task.files || []).join(", "))}</small>`,
        "</div>"
      ].join("")).join("") || "<p class=\"muted\">No tasks</p>";

      els.files.innerHTML = state.selected_files.map((file) => [
        "<div class=\"item\">",
        `${esc(file.path)}<br><small>${esc(file.role || "")}</small>`,
        "</div>"
      ].join("")).join("") || "<p class=\"muted\">No context</p>";

      els.timeline.innerHTML = renderTimeline(state.progress_history || []);
      els.ledger.innerHTML = renderLedger(state.plan_ledger);
      els.experience.innerHTML = renderExperience(state.experience);
      els.chat.innerHTML = state.chat.map((message) => [
        "<div class=\"item\">",
        `<b>${esc(message.from)} -> ${esc(message.to)}</b>`,
        `<p>${esc(message.message)}</p>`,
        "</div>"
      ].join("")).join("") || "<p class=\"muted\">No messages</p>";

      renderQuality(state.eval_report);
      renderTokens(state.token_report);
      els.checks.textContent = JSON.stringify(state.checks, null, 2);
    }

    function syncControls(state) {
      const firstWorker = (state.agents || []).find((agent) => agent.role === "worker");
      const worker = firstWorker?.agent || state.default_worker || "codex";
      if (!els.workerName.dataset.touched) els.workerName.value = worker;
      if (!els.agentName.dataset.touched) els.agentName.value = firstWorker?.agent || worker;
      if (!els.progressStep.options.length) {
        for (const step of state.progress_steps || steps) {
          const option = document.createElement("option");
          option.value = step;
          option.textContent = `${stepLabels[step] || step} (${step})`;
          els.progressStep.appendChild(option);
        }
        els.progressStep.value = "editing";
      }
    }

    function normalizeAgentName(agent) {
      const value = String(agent || "").trim().toLowerCase();
      return agentAliases[value] || value;
    }

    function renderRunnerClock() {
      const runner = currentState?.runner;
      if (!runner) {
        els.runner.textContent = "";
        return;
      }
      els.runner.textContent = `${runner.worker} running (${runner.engine}) ${durationText(Date.now() - Date.parse(runner.started_at))} pid ${runner.pid}`;
    }

    async function load() {
      try {
        render(await fetch("/api/state").then((response) => response.json()));
      } catch {
        // The next SSE update or interval tick can recover the view.
      }
    }

    function connect() {
      const stream = new EventSource("/api/stream");
      stream.onopen = () => setStreamStatus(true);
      stream.onmessage = (event) => {
        try { render(JSON.parse(event.data)); } catch {}
      };
      stream.onerror = () => setStreamStatus(false);
    }

    function setStreamStatus(connected) {
      els.streamStatus.classList.toggle("connected", connected);
      els.streamStatus.classList.toggle("disconnected", !connected);
      els.streamStatus.textContent = connected ? "Realtime connected" : "Realtime reconnecting";
    }

    function renderQuality(report) {
      els.quality.innerHTML = [
        `<div class="item"><b>${report.score}/100</b> ${esc(report.grade)}</div>`,
        `<div class="item"><small>${esc(report.next_action)}</small></div>`,
        ...report.cases.map((item) => `<div class="item">${item.ok ? "OK" : "FAIL"} ${esc(item.id)}<br><small>${esc(item.value)}</small></div>`)
      ].join("");
    }

    function renderTokens(report) {
      els.tokens.innerHTML = [
        `<div class="item"><b>${report.estimates.chay_context_tokens}</b> Chạy Runtime tokens</div>`,
        `<div class="item"><b>${report.estimates.full_repo_tokens}</b> full repo estimate</div>`,
        `<div class="item"><b>${report.estimates.savings_percent}%</b> savings</div>`,
        `<div class="item">work ${report.notes.work_note.tokens}/${report.budgets.maxNoteTokens}<br>result ${report.notes.result_note.tokens}/${report.budgets.maxResultTokens}<br><small>${esc((report.violations || []).map((item) => item.type).join(", ") || "within budget")}</small></div>`
      ].join("");
    }

    function renderTimeline(history) {
      const rows = history.slice(-20);
      return rows.slice().reverse().map((item, reversedIndex) => {
        const index = rows.length - 1 - reversedIndex;
        const next = rows[index + 1];
        const ms = next?.updated_at ? Date.parse(next.updated_at) - Date.parse(item.updated_at) : Date.now() - Date.parse(item.updated_at);
        const duration = Number.isFinite(ms) && ms >= 0 ? durationText(ms) : "";
        return [
        "<div class=\"item\">",
        `<b>${esc(item.agent)} - ${esc(item.step)}</b>`,
        `<p>${esc(item.message || "")}</p>`,
        `<small>${esc(new Date(item.updated_at).toLocaleTimeString())} · ${esc(next ? `took ${duration}` : `running ${duration}`)}</small>`,
        "</div>"
      ].join("");
      }).join("") || "<p class=\"muted\">No progress yet</p>";
    }

    function renderLedger(ledger) {
      if (!ledger) return "<p class=\"muted\">No ledger yet</p>";
      return (ledger.steps_done || []).map((step) => [
        "<div class=\"item\">",
        `<b>#${step.step_index} ${esc(step.worker)}</b>`,
        `<p>${esc(step.result_summary)}</p>`,
        `<small>${esc((step.changed_files || []).join(", "))}</small>`,
        "</div>"
      ].join("")).join("") || "<p class=\"muted\">No completed steps</p>";
    }

    function renderExperience(experience) {
      if (!experience) return "<p class=\"muted\">No snapshot yet</p>";
      return [
        `<div class="item"><b>${esc(experience.framework)}</b></div>`,
        `<div class="item">memory refs ${esc((experience.spectrum?.memory?.refs || []).length)}<br>skills ${esc((experience.spectrum?.skills?.items || []).length)}<br>rules ${esc(experience.spectrum?.rules?.policy_ref || "")}</div>`
      ].join("");
    }

    function runOptions() {
      return {
        worker: normalizeAgentName(els.workerName.value.trim() || "codex"),
        agent: normalizeAgentName(els.agentName.value.trim() || els.workerName.value.trim() || "codex"),
        maxRetries: Number(els.maxRetries.value || 3),
        isolate: els.isolate.checked,
        testCommand: els.testCommand.value.trim()
      };
    }

    function showResult(data) {
      els.actionResult.textContent = JSON.stringify(data, null, 2);
    }

    async function createNote() {
      const task = els.taskText.value.trim();
      if (!task) return;
      showResult({ ok: true, status: "creating_work_note" });
      showResult(await api("/api/action", { action: "create_task", task, run: false, ...runOptions() }));
      load();
    }

    async function createTask() {
      const task = els.taskText.value.trim();
      if (!task) return;
      showResult({ ok: true, status: "creating_task_and_dispatching" });
      showResult(await api("/api/action", { action: "create_task", task, run: true, ...runOptions() }));
      els.taskText.value = "";
      load();
    }

    async function runWorker() {
      showResult({ ok: true, status: "dispatching_worker" });
      showResult(await api("/api/action", { action: "run_worker", ...runOptions() }));
      load();
    }

    async function updateProgress() {
      showResult(await api("/api/progress", {
        agent: normalizeAgentName(els.workerName.value.trim() || "codex"),
        step: els.progressStep.value,
        message: els.progressMessage.value.trim() || els.progressStep.value
      }));
      els.progressMessage.value = "";
      load();
    }

    async function validateOutput() {
      showResult(await api("/api/action", { action: "validate_output", worker: runOptions().worker }));
      load();
    }

    async function patchCheck() {
      showResult({ ok: true, status: "checking_patch_boundary" });
      showResult(await api("/api/action", { action: "patch_check", worker: runOptions().worker }));
      load();
    }

    async function tokenReport() {
      showResult(await api("/api/action", { action: "token_report", worker: runOptions().worker }));
      load();
    }

    async function evalReport() {
      showResult(await api("/api/action", { action: "eval_report", worker: runOptions().worker }));
      load();
    }

    async function experienceSnapshot() {
      showResult(await api("/api/action", { action: "experience_snapshot", worker: runOptions().worker }));
      load();
    }

    async function sendChat() {
      const text = els.message.value.trim();
      if (!text) return;
      showResult(await api("/api/chat", { from: "human", to: "main", message: text }));
      els.message.value = "";
      load();
    }

    for (const control of [els.workerName, els.agentName]) {
      control.addEventListener("input", () => { control.dataset.touched = "1"; });
    }

    function esc(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function durationText(ms) {
      const total = Math.max(0, Math.floor(Number(ms || 0) / 1000));
      const minutes = Math.floor(total / 60);
      const seconds = total % 60;
      return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
    }

    function ageText(value) {
      if (!value) return "no timestamp";
      const ms = Date.now() - Date.parse(value);
      return Number.isFinite(ms) ? `updated ${durationText(ms)} ago` : "no timestamp";
    }

    function tickClocks() {
      renderRunnerClock();
      document.querySelectorAll(".live-age").forEach((node) => {
        node.textContent = ageText(node.dataset.at);
      });
      if (currentState) {
        els.timeline.innerHTML = renderTimeline(currentState.progress_history || []);
      }
    }

    load();
    connect();
    setInterval(load, 10000);
    clockTimer = setInterval(tickClocks, 1000);
  </script>
</body>
</html>
